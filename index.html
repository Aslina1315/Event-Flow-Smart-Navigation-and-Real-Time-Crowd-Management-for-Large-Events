<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventFlow | Advanced Crowd Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --background: #05070a;
            --surface: rgba(13, 17, 23, 0.8);
            --royal: #0052FF;
            --indigo: #8b5cf6;
            --cyan: #06b6d4;
            --emerald: #10b981;
            --rose: #e11d48;
            --premium-gradient: linear-gradient(135deg, var(--royal) 0%, var(--indigo) 50%, var(--cyan) 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            color: #f1f5f9;
            overflow-x: hidden;
            line-height: 1.5;
        }

        .premium-text-gradient {
            background: var(--premium-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(0, 82, 255, 0.3);
            transform: translateY(-5px);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            padding: 4rem 0;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 2rem;
            display: inline-block;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 0.9;
        }

        .subtitle {
            color: #64748b;
            font-size: 1.25rem;
            margin-top: 1.5rem;
            font-weight: 500;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 4rem;
        }

        .stat-card {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .stat-info p {
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #475569;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -0.02em;
        }

        .stat-icon {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-title::before {
            content: '';
            width: 0.5rem;
            height: 2rem;
            background: var(--royal);
            border-radius: 1rem;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .event-card {
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 600px;
        }

        .event-image {
            height: 250px;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        .event-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--background), transparent);
        }

        .event-badge {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            background: var(--royal);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            z-index: 10;
        }

        .event-content {
            padding: 2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .event-title {
            font-size: 1.75rem;
            font-weight: 900;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .event-details {
            margin-top: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .book-btn {
            margin-top: 2rem;
            background: var(--premium-gradient);
            color: white;
            border: none;
            padding: 1.25rem;
            border-radius: 1.25rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 82, 255, 0.3);
        }

        .book-btn:hover {
            box-shadow: 0 15px 30px rgba(0, 82, 255, 0.5);
            transform: scale(1.02);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .live-pulse {
            width: 8px;
            height: 8px;
            background: var(--royal);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <div style="background: var(--surface); border: 1px solid rgba(255,255,255,0.1); padding: 1.5rem; border-radius: 2rem; box-shadow: 0 0 30px rgba(0,82,255,0.2);">
                    <i data-lucide="zap" style="color: var(--royal); width: 48px; height: 48px;"></i>
                </div>
            </div>
            <h1>EVENT<span class="premium-text-gradient">FLOW.</span></h1>
            <p class="subtitle">Global Crowd Intelligence & Real-Time Synchronization</p>
        </header>

        <div class="dashboard-grid">
            <div class="glass-card stat-card">
                <div class="stat-info">
                    <p><span class="live-pulse"></span>Real-Time Pulse</p>
                    <div class="stat-value" id="pulse-value">124,500</div>
                </div>
                <div class="stat-icon" style="background: rgba(0, 82, 255, 0.1); color: var(--royal);">
                    <i data-lucide="radio"></i>
                </div>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-info">
                    <p>Operational Hubs</p>
                    <div class="stat-value">12</div>
                </div>
                <div class="stat-icon" style="background: rgba(139, 92, 246, 0.1); color: var(--indigo);">
                    <i data-lucide="activity"></i>
                </div>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-info">
                    <p>Flow Velocity</p>
                    <div class="stat-value" id="velocity-value">64%</div>
                </div>
                <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: var(--emerald);">
                    <i data-lucide="trending-up"></i>
                </div>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-info">
                    <p>Active Alerts</p>
                    <div class="stat-value" id="alerts-value">2</div>
                </div>
                <div class="stat-icon" style="background: rgba(225, 29, 72, 0.1); color: var(--rose);">
                    <i data-lucide="alert-triangle"></i>
                </div>
            </div>
        </div>

        <h2 class="section-title">Global <span class="premium-text-gradient">Hubs.</span></h2>
        <div class="events-grid" id="events-container"></div>

        <footer style="margin-top: 6rem; padding-bottom: 4rem; text-align: center; color: #475569; font-size: 0.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.4em;">
            © 2026 EventFlow Intelligence Ecosystem • Secure Satellite Link Active
        </footer>
    </div>

    <script>
        const MOCK_EVENTS = [
            { title: 'Margazhi Music Festival', type: 'Music Festival', date: 'Dec 15, 2026', time: '18:00', location: 'Music Academy, Chennai', status: 'High Density', image: 'https://images.unsplash.com/photo-1514525253361-bee8718a300c?w=800&q=80' },
            { title: 'Global Tech Expo 2026', type: 'Conference', date: 'Nov 10, 2026', time: '09:00', location: 'BIEC, Bangalore', status: 'Moderate', image: 'https://images.unsplash.com/photo-1547826039-bfc35e0f1ea8?w=800&q=80' },
            { title: 'Paris Fashion Week', type: 'Arts & Culture', date: 'Sep 28, 2026', time: '10:00', location: 'Louvre, Paris', status: 'Critical', image: 'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=800&q=80' },
            { title: 'FIFA World Cup Opening', type: 'Sports', date: 'Jun 11, 2026', time: '19:00', location: 'Azteca, Mexico City', status: 'Extreme', image: 'https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=800&q=80' },
            { title: 'Tokyo Sakura Gala', type: 'Celebration', date: 'Apr 25, 2026', time: '11:00', location: 'Ueno Park, Tokyo', status: 'High Density', image: 'https://images.unsplash.com/photo-1522383225653-ed111181a951?w=800&q=80' },
            { title: 'Dubai Shopping Fest', type: 'Festival', date: 'Dec 15, 2026', time: '10:00', location: 'Dubai Mall, UAE', status: 'Moderate', image: 'https://images.unsplash.com/photo-1512453979798-5ea266f8880c?w=800&q=80' },
            { title: 'Wimbledon Final', type: 'Sports', date: 'Jul 12, 2026', time: '14:00', location: 'London, UK', status: 'High Density', image: 'https://images.unsplash.com/photo-1622279457486-62dcc4a4bd13?w=800&q=80' },
            { title: 'Vivid Sydney Lights', type: 'Arts & Culture', date: 'May 22, 2026', time: '18:00', location: 'Circular Quay, Sydney', status: 'High Density', image: 'https://images.unsplash.com/photo-1506973035872-a4ec16b8e8d9?w=800&q=80' }
        ];

        const container = document.getElementById('events-container');
        MOCK_EVENTS.forEach(event => {
            const card = document.createElement('div');
            card.className = 'glass-card event-card';
            card.innerHTML = `
                <div class="event-image" style="background-image: url('${event.image}')">
                    <span class="event-badge">${event.type}</span>
                </div>
                <div class="event-content">
                    <h3 class="event-title">${event.title}</h3>
                    <div class="event-details">
                        <div class="detail-item"><i data-lucide="calendar"></i> ${event.date}</div>
                        <div class="detail-item"><i data-lucide="map-pin"></i> ${event.location}</div>
                        <div class="detail-item"><i data-lucide="users"></i> Status: ${event.status}</div>
                    </div>
                    <button class="book-btn">Authorize Entry</button>
                </div>
            `;
            container.appendChild(card);
        });

        let pulse = 124500;
        let velocity = 64;
        let alerts = 2;

        setInterval(() => {
            pulse += Math.floor(Math.random() * 200) - 80;
            velocity = Math.min(98, Math.max(12, velocity + Math.floor(Math.random() * 5) - 2));
            if (Math.random() > 0.9) alerts = Math.max(0, alerts + (Math.random() > 0.5 ? 1 : -1));

            document.getElementById('pulse-value').innerText = pulse.toLocaleString();
            document.getElementById('velocity-value').innerText = velocity + '%';
            document.getElementById('alerts-value').innerText = alerts;
        }, 2000);

        lucide.createIcons();
    </script>
</body>
</html>
