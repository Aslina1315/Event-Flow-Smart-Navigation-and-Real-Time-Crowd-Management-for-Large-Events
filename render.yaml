services:
- type: web
  name: eventflow
    plan: free
      env: node
     buildCommand: "cd client && npm install && npm run build && cd ../server && npm install"
          startCommand: "cd server && npm start"
            envVars:
              - key: NODE_VERSION
                  value: "20.x"
                    - key: NODE_ENV
                        value: production
                        
